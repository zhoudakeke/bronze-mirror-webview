<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>铜镜 3D 详情</title>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.162.0/build/three.module.js"
        }
      }
    </script>
    <style>
      :root {
        color-scheme: light;
        --bg: #f3eadb;
        --panel: rgba(255, 250, 242, 0.92);
        --border: rgba(153, 112, 64, 0.28);
        --text: #2d241f;
        --muted: #6d5b4d;
        --bronze: #986333;
        --bronze-soft: rgba(152, 99, 51, 0.14);
        --jade: #355e52;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top, #f8f0e3 0, var(--bg) 45%, #e9dcc7 100%);
      }

      .shell {
        width: min(1200px, 100%);
        margin: 0 auto;
        padding: 24px 18px 36px;
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1.4fr) minmax(280px, 0.8fr);
        gap: 18px;
      }

      .stage,
      .side {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 26px;
        box-shadow: 0 20px 50px rgba(46, 32, 18, 0.08);
        backdrop-filter: blur(14px);
      }

      .stage {
        position: relative;
        min-height: 78vh;
        overflow: hidden;
      }

      .stage canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      .stage-top {
        position: absolute;
        left: 18px;
        top: 18px;
        z-index: 5;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .eyebrow,
      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(255, 250, 242, 0.9);
        border: 1px solid var(--border);
        color: var(--muted);
        font-size: 13px;
      }

      .overlay {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .hotspot {
        position: absolute;
        width: 44px;
        height: 44px;
        margin-left: -22px;
        margin-top: -22px;
        border: 0;
        background: transparent;
        pointer-events: auto;
        cursor: pointer;
      }

      .hotspot::before,
      .hotspot::after {
        content: "";
        position: absolute;
        inset: 50% auto auto 50%;
        transform: translate(-50%, -50%);
        border-radius: 999px;
      }

      .hotspot::before {
        width: 40px;
        height: 40px;
        background: rgba(152, 99, 51, 0.18);
        animation: pulse 1.8s ease-in-out infinite;
      }

      .hotspot::after {
        width: 14px;
        height: 14px;
        background: radial-gradient(circle at 35% 35%, #ebc788 0 28%, var(--bronze) 29% 100%);
        box-shadow: 0 0 0 6px rgba(152, 99, 51, 0.14);
      }

      .hotspot.active::before {
        background: rgba(53, 94, 82, 0.18);
      }

      .hotspot.active::after {
        background: radial-gradient(circle at 35% 35%, #b6dfd2 0 28%, var(--jade) 29% 100%);
        box-shadow: 0 0 0 7px rgba(53, 94, 82, 0.16);
      }

      .hotspot-label {
        position: absolute;
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: rgba(255, 250, 242, 0.95);
        color: var(--text);
        font-size: 13px;
        white-space: nowrap;
        transform: translate(16px, -50%);
        pointer-events: none;
      }

      .hotspot-label.active {
        color: var(--jade);
        border-color: rgba(53, 94, 82, 0.35);
      }

      .side {
        padding: 22px;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .title {
        font-size: clamp(28px, 4vw, 42px);
        line-height: 1.1;
        font-weight: 800;
      }

      .subtitle,
      .copy,
      .meta,
      .node-copy {
        color: var(--muted);
        line-height: 1.7;
      }

      .chip-row,
      .node-list {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .chip {
        border: 1px solid var(--border);
        background: rgba(255, 250, 242, 0.92);
        color: var(--text);
        padding: 10px 14px;
        border-radius: 999px;
        cursor: pointer;
      }

      .chip.active {
        color: var(--jade);
        border-color: rgba(53, 94, 82, 0.35);
        background: rgba(226, 240, 236, 0.95);
      }

      .card {
        border-radius: 20px;
        border: 1px solid rgba(153, 112, 64, 0.18);
        background: rgba(250, 244, 236, 0.8);
        padding: 16px;
      }

      .section-title {
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 10px;
      }

      .node-list {
        flex-direction: column;
      }

      .node {
        border-radius: 16px;
        background: rgba(255, 250, 242, 0.88);
        border: 1px solid rgba(153, 112, 64, 0.16);
        padding: 14px;
      }

      .node-title {
        font-weight: 700;
      }

      .node-meta {
        font-size: 12px;
        color: var(--bronze);
        margin-top: 4px;
      }

      @keyframes pulse {
        0% { transform: translate(-50%, -50%) scale(0.92); opacity: 0.5; }
        50% { transform: translate(-50%, -50%) scale(1.08); opacity: 1; }
        100% { transform: translate(-50%, -50%) scale(0.92); opacity: 0.5; }
      }

      @media (max-width: 960px) {
        .hero {
          grid-template-columns: 1fr;
        }

        .stage {
          min-height: 62vh;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="hero">
        <section class="stage">
          <div class="stage-top">
            <div class="eyebrow">铜镜 3D 纹理版</div>
            <div class="status" id="status">模型载入中...</div>
          </div>
          <canvas id="scene"></canvas>
          <div class="overlay" id="overlay"></div>
        </section>

        <aside class="side">
          <div>
            <div class="title" id="mirror-title">海兽葡萄镜</div>
            <div class="subtitle" id="mirror-subtitle">唐代 · 海兽葡萄纹 · 原型示例馆藏</div>
          </div>

          <div class="chip-row" id="chip-row"></div>

          <div class="card">
            <div class="section-title" id="hotspot-title">当前热点</div>
            <div class="meta" id="hotspot-hint"></div>
            <div class="copy" id="hotspot-summary"></div>
            <div class="copy" id="hotspot-detail" style="margin-top: 10px;"></div>
          </div>

          <div class="card">
            <div class="section-title">关联知识</div>
            <div class="node-list" id="related-nodes"></div>
          </div>
        </aside>
      </div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
  </html>
