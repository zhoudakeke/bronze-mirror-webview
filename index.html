<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>铜镜 3D 详情</title>
    <script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.162.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.162.0/examples/jsm/",
          "cytoscape": "https://cdn.jsdelivr.net/npm/cytoscape@3.30.0/dist/cytoscape.esm.min.mjs"
        }
      }
    </script>
    <style>
      :root {
        color-scheme: light;
        --bg: #f3eadb;
        --panel: rgba(255, 250, 242, 0.92);
        --border: rgba(153, 112, 64, 0.28);
        --text: #2d241f;
        --muted: #6d5b4d;
        --bronze: #986333;
        --bronze-soft: rgba(152, 99, 51, 0.14);
        --jade: #355e52;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background: #1a0e06;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -2;
        background: url("./assets/home-bg.png") center / cover no-repeat;
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        background: linear-gradient(180deg, rgba(26, 14, 6, 0.14), rgba(26, 14, 6, 0.44));
      }

      .shell {
        width: min(1200px, 100%);
        margin: 0 auto;
        padding: 12px 12px 24px;
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1.4fr) minmax(280px, 0.8fr);
        gap: 18px;
      }

      .stage,
      .side {
        background: rgba(255, 250, 242, 0.68);
        border: 1px solid var(--border);
        border-radius: 26px;
        box-shadow: 0 20px 50px rgba(46, 32, 18, 0.08);
        backdrop-filter: blur(18px);
      }

      .stage {
        position: relative;
        min-height: calc(100vh - 36px);
        overflow: hidden;
      }

      .stage.home-only {
        min-height: 100vh;
        border-radius: 0;
        border: 0;
        background: transparent;
        box-shadow: none;
        backdrop-filter: none;
      }

      .stage-backdrop {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 50% 38%, rgba(255, 244, 223, 0.26), rgba(255, 244, 223, 0) 44%),
          linear-gradient(180deg, rgba(255, 250, 242, 0.08), rgba(255, 250, 242, 0.22));
        pointer-events: none;
      }

      .stage canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      .stage-top {
        position: absolute;
        left: 18px;
        top: 18px;
        z-index: 5;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .eyebrow,
      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(255, 250, 242, 0.9);
        border: 1px solid var(--border);
        color: var(--muted);
        font-size: 13px;
      }

      .overlay {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .hotspot {
        position: absolute;
        width: 44px;
        height: 44px;
        margin-left: -22px;
        margin-top: -22px;
        border: 0;
        background: transparent;
        pointer-events: auto;
        cursor: pointer;
      }

      .hotspot::before,
      .hotspot::after {
        content: "";
        position: absolute;
        inset: 50% auto auto 50%;
        transform: translate(-50%, -50%);
        border-radius: 999px;
      }

      .hotspot::before {
        width: 40px;
        height: 40px;
        background: rgba(152, 99, 51, 0.18);
        animation: pulse 1.8s ease-in-out infinite;
      }

      .hotspot::after {
        width: 14px;
        height: 14px;
        background: radial-gradient(circle at 35% 35%, #ebc788 0 28%, var(--bronze) 29% 100%);
        box-shadow: 0 0 0 6px rgba(152, 99, 51, 0.14);
      }

      .hotspot.active::before {
        background: rgba(53, 94, 82, 0.18);
      }

      .hotspot.active::after {
        background: radial-gradient(circle at 35% 35%, #b6dfd2 0 28%, var(--jade) 29% 100%);
        box-shadow: 0 0 0 7px rgba(53, 94, 82, 0.16);
      }

      .hotspot-label {
        position: absolute;
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: rgba(255, 250, 242, 0.95);
        color: var(--text);
        font-size: 13px;
        white-space: nowrap;
        transform: translate(16px, -50%);
        pointer-events: none;
      }

      .hotspot-label.active {
        color: var(--jade);
        border-color: rgba(53, 94, 82, 0.35);
      }

      .side {
        padding: 22px;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .title {
        font-size: clamp(28px, 4vw, 42px);
        line-height: 1.1;
        font-weight: 800;
      }

      .subtitle,
      .copy,
      .meta,
      .node-copy {
        color: var(--muted);
        line-height: 1.7;
      }

      .chip-row,
      .node-list {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .chip {
        border: 1px solid var(--border);
        background: rgba(255, 250, 242, 0.92);
        color: var(--text);
        padding: 10px 14px;
        border-radius: 999px;
        cursor: pointer;
      }

      .chip.active {
        color: var(--jade);
        border-color: rgba(53, 94, 82, 0.35);
        background: rgba(226, 240, 236, 0.95);
      }

      .card {
        border-radius: 20px;
        border: 1px solid rgba(153, 112, 64, 0.18);
        background: rgba(250, 244, 236, 0.8);
        padding: 16px;
      }

      .section-title {
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 10px;
      }

      .node-list {
        flex-direction: column;
      }

      .node {
        border-radius: 16px;
        background: rgba(255, 250, 242, 0.88);
        border: 1px solid rgba(153, 112, 64, 0.16);
        padding: 14px;
      }

      .node-title {
        font-weight: 700;
      }

      .node-meta {
        font-size: 12px;
        color: var(--bronze);
        margin-top: 4px;
      }

      @keyframes pulse {
        0% { transform: translate(-50%, -50%) scale(0.92); opacity: 0.5; }
        50% { transform: translate(-50%, -50%) scale(1.08); opacity: 1; }
        100% { transform: translate(-50%, -50%) scale(0.92); opacity: 0.5; }
      }

      /* ===== mini 图谱抽屉（右下悬浮） ===== */
      .mini-graph-dock {
        position: absolute;
        right: 14px;
        bottom: 14px;
        z-index: 6;
        width: 196px;
        background: rgba(255, 250, 242, 0.92);
        border: 1px solid var(--border);
        border-radius: 18px;
        box-shadow: 0 14px 32px rgba(46, 32, 18, 0.16);
        backdrop-filter: blur(10px);
        overflow: hidden;
        transition: transform 0.25s ease, opacity 0.25s ease;
      }
      .mini-graph-dock.collapsed .mini-graph-body { display: none; }
      .mini-graph-dock.collapsed { width: auto; }
      .mini-graph-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 12px;
        font-size: 12px;
        color: var(--muted);
        border-bottom: 1px solid rgba(153,112,64,0.12);
      }
      .mini-graph-dock.collapsed .mini-graph-head { border-bottom: 0; }
      .mini-graph-head .dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: var(--bronze); display: inline-block; margin-right: 6px;
      }
      .mini-graph-actions { display: flex; gap: 4px; }
      .mini-graph-btn {
        border: 0; background: transparent; color: var(--muted);
        cursor: pointer; padding: 2px 6px; font-size: 13px; line-height: 1;
        border-radius: 6px;
      }
      .mini-graph-btn:hover { background: rgba(152,99,51,0.10); color: var(--text); }
      .mini-graph-body {
        width: 196px; height: 180px;
        background: rgba(255, 250, 242, 0.6);
      }
      #mini-graph-canvas { width: 100%; height: 100%; }

      /* ===== 全屏图谱浮层 ===== */
      .graph-fullscreen {
        position: fixed; inset: 0; z-index: 50;
        background: rgba(243, 234, 219, 0.96);
        backdrop-filter: blur(8px);
        display: flex; flex-direction: column;
      }
      .graph-fullscreen[hidden] { display: none; }
      .graph-fullscreen-head {
        display: flex; align-items: center; justify-content: space-between;
        padding: 14px 18px;
        border-bottom: 1px solid var(--border);
        background: rgba(255, 250, 242, 0.85);
      }
      .graph-fullscreen-title {
        font-weight: 700; font-size: 16px;
      }
      .graph-fullscreen-sub {
        font-size: 12px; color: var(--muted); margin-left: 8px;
      }
      .graph-fullscreen-close {
        border: 1px solid var(--border); background: rgba(255,250,242,0.95);
        padding: 6px 12px; border-radius: 999px; cursor: pointer;
        color: var(--text); font-size: 13px;
      }
      .graph-fullscreen-canvas {
        flex: 1; position: relative; overflow: hidden;
      }
      #full-graph-canvas { width: 100%; height: 100%; }

      .graph-detail-card {
        position: absolute; left: 16px; right: 16px; bottom: 16px;
        background: rgba(255, 250, 242, 0.96);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 14px 16px;
        box-shadow: 0 14px 32px rgba(46, 32, 18, 0.18);
        max-width: 520px;
        margin: 0 auto;
        transform: translateY(120%);
        transition: transform 0.28s ease;
      }
      .graph-detail-card.show { transform: translateY(0); }
      .graph-detail-meta {
        font-size: 12px; color: var(--bronze); margin-bottom: 4px;
      }
      .graph-detail-title { font-weight: 700; font-size: 17px; margin-bottom: 6px; }
      .graph-detail-summary { color: var(--muted); line-height: 1.6; font-size: 14px; }
      .graph-detail-actions {
        display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap;
      }
      .graph-detail-btn {
        border: 1px solid var(--border);
        background: rgba(255, 250, 242, 0.95);
        color: var(--text);
        padding: 8px 14px; border-radius: 999px; font-size: 13px; cursor: pointer;
      }
      .graph-detail-btn.primary {
        color: #fff; background: var(--bronze); border-color: var(--bronze);
      }

      @media (max-width: 960px) {
        .hero {
          grid-template-columns: 1fr;
        }

        .stage {
          min-height: 66vh;
        }

        .mini-graph-dock { width: 168px; }
        .mini-graph-body { width: 168px; height: 156px; }
      }

      body.home-mode .shell {
        width: 100%;
        padding: 0;
        margin: 0;
      }

      body.home-mode .hero {
        grid-template-columns: 1fr;
        gap: 0;
      }

      body.home-mode .side,
      body.home-mode .mini-graph-dock,
      body.home-mode .stage-top {
        display: none;
      }

      body.home-mode .stage::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(circle at 50% 50%, rgba(255, 248, 236, 0.08), rgba(255, 248, 236, 0) 55%);
      }

      body.home-mode .overlay {
        z-index: 3;
      }

      body.home-mode .hotspot-label {
        background: rgba(255, 250, 242, 0.9);
        backdrop-filter: blur(10px);
        font-size: 14px;
      }

      /* ===== 封面模式（入口页） ===== */
      body.cover-mode { background: #1a0e06; overflow: hidden; }
      body.cover-mode::before {
        background: url("./assets/home-bg.png") center / cover no-repeat;
      }
      body.cover-mode .shell { width: 100%; padding: 0; margin: 0; }
      body.cover-mode .hero { grid-template-columns: 1fr; gap: 0; }
      body.cover-mode .side,
      body.cover-mode .mini-graph-dock,
      body.cover-mode .stage-top,
      body.cover-mode .overlay { display: none; }
      body.cover-mode::after { display: none; }
      body.cover-mode .stage-backdrop { display: none; }

      /* 3D canvas 限制在背景中央圆框内（略小于圆框） */
      body.cover-mode .stage canvas#scene {
        position: absolute;
        left: 50%;
        top: 50%;
        width: min(58vw, 58vh);
        height: min(58vw, 58vh);
        transform: translate(-50%, -50%);
        border-radius: 50%;
        z-index: 2;
      }

      .cover-ui {
        position: absolute;
        inset: 0;
        z-index: 9;
        pointer-events: none;
      }
      .cover-ui[hidden] { display: none; }

      /* 顶部右侧竖排标题：瘦金体风格、深色 */
      .cover-title-vertical {
        position: absolute;
        top: 56px;
        right: 26px;
        writing-mode: vertical-rl;
        text-orientation: upright;
        font-family: "瘦金体", "Shou Jin Ti", "Slender Gold", "STXingkai",
          "HanyiSentyPagoda", "STKaiti", "KaiTi", "STSong", serif;
        font-weight: 300;
        font-style: italic;
        font-size: clamp(32px, 6.6vw, 46px);
        letter-spacing: 0.34em;
        color: #1a0c04;
        text-shadow:
          0 1px 0 rgba(255, 220, 170, 0.18),
          0 2px 8px rgba(0, 0, 0, 0.18);
        pointer-events: none;
        line-height: 1.05;
      }
      .cover-title-vertical::after {
        content: "";
        display: block;
        width: 1px;
        height: 38px;
        margin: 14px auto 0;
        background: linear-gradient(180deg, #2a160a, rgba(42, 22, 10, 0));
      }

      /* 底部点击进入按钮：金线方框 */
      .cover-enter {
        position: absolute;
        left: 50%;
        bottom: 64px;
        transform: translateX(-50%);
        appearance: none;
        display: inline-flex;
        align-items: center;
        gap: 12px;
        border: 1px solid rgba(58, 32, 12, 0.55);
        background: linear-gradient(180deg, rgba(245, 226, 188, 0.32), rgba(214, 184, 132, 0.42));
        color: #2a160a;
        font-family: "瘦金体", "Shou Jin Ti", "STKaiti", "KaiTi", "STSong", serif;
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 0.5em;
        padding: 12px 26px 12px 30px;
        border-radius: 2px;
        cursor: pointer;
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        box-shadow:
          0 6px 18px rgba(40, 22, 8, 0.28),
          inset 0 0 0 1px rgba(58, 32, 12, 0.18);
        pointer-events: auto;
        transition: transform 0.18s ease, box-shadow 0.18s ease;
      }
      .cover-enter:active { transform: translateX(-50%) translateY(1px); }
      .cover-enter::before,
      .cover-enter::after {
        content: "";
        width: 14px;
        height: 1px;
        background: linear-gradient(90deg, rgba(58, 32, 12, 0), #3a200c, rgba(58, 32, 12, 0));
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="hero">
        <section class="stage">
          <div class="stage-top">
            <div class="eyebrow">铜镜 3D 纹理版</div>
            <div class="status" id="status">模型载入中...</div>
          </div>
          <div class="stage-backdrop"></div>
          <canvas id="scene"></canvas>
          <div class="overlay" id="overlay"></div>

          <div class="cover-ui" id="cover-ui" hidden>
            <div class="cover-title-vertical" id="cover-title">镜中纹</div>
            <button class="cover-enter" id="cover-enter">点 击 进 入</button>
          </div>

          <div class="mini-graph-dock" id="mini-graph-dock">
            <div class="mini-graph-head">
              <span><span class="dot"></span>知识图谱</span>
              <span class="mini-graph-actions">
                <button class="mini-graph-btn" id="mini-graph-expand" title="展开">⤢</button>
                <button class="mini-graph-btn" id="mini-graph-toggle" title="收起">－</button>
              </span>
            </div>
            <div class="mini-graph-body">
              <div id="mini-graph-canvas"></div>
            </div>
          </div>
        </section>

        <aside class="side">
          <div>
            <div class="title" id="mirror-title">海兽葡萄镜</div>
            <div class="subtitle" id="mirror-subtitle">唐代 · 海兽葡萄纹 · 原型示例馆藏</div>
          </div>

          <div class="chip-row" id="chip-row"></div>

          <div class="card">
            <div class="section-title" id="hotspot-title">当前热点</div>
            <div class="meta" id="hotspot-hint"></div>
            <div class="copy" id="hotspot-summary"></div>
            <div class="copy" id="hotspot-detail" style="margin-top: 10px;"></div>
          </div>

          <div class="card">
            <div class="section-title">关联知识</div>
            <div class="node-list" id="related-nodes"></div>
          </div>
        </aside>
      </div>
    </div>

    <div class="graph-fullscreen" id="graph-fullscreen" hidden>
      <div class="graph-fullscreen-head">
        <div>
          <span class="graph-fullscreen-title">知识图谱</span>
          <span class="graph-fullscreen-sub" id="graph-fullscreen-sub">焦点 · 2 跳子图</span>
        </div>
        <button class="graph-fullscreen-close" id="graph-fullscreen-close">关闭 ✕</button>
      </div>
      <div class="graph-fullscreen-canvas">
        <div id="full-graph-canvas"></div>
        <div class="graph-detail-card" id="graph-detail-card">
          <div class="graph-detail-meta" id="graph-detail-meta"></div>
          <div class="graph-detail-title" id="graph-detail-title"></div>
          <div class="graph-detail-summary" id="graph-detail-summary"></div>
          <div class="graph-detail-actions" id="graph-detail-actions"></div>
        </div>
      </div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
  </html>
